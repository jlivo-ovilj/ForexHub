<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ForexHub">
<title>ForexHub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--sf:#131313;--sf2:#1a1a1a;--bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.14);
  --tx:#f0ede8;--mt:#6b6b6b;--ac:#c8f135;--adm:rgba(200,241,53,0.12);
  --buy:#4ade80;--bbg:rgba(74,222,128,0.1);
  --sel:#f87171;--sbg:rgba(248,113,113,0.1);
  --wt:#fbbf24;--wbg:rgba(251,191,36,0.1);
  --r:14px;--rs:8px
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* Header */
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:17px;font-weight:700;letter-spacing:-0.02em}.logo span{color:var(--ac)}
.hdate{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt);text-align:right;line-height:1.4}

/* Nav */
.nav{display:flex;gap:4px;padding:12px 20px;border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{white-space:nowrap;padding:7px 16px;border-radius:100px;font-family:'Syne',sans-serif;font-size:13px;font-weight:500;border:1px solid var(--bd2);background:transparent;color:var(--mt);cursor:pointer;flex-shrink:0}
.nb.active{background:var(--ac);color:#0a0a0a;border-color:var(--ac)}

/* Main */
.main{padding:20px;max-width:680px;margin:0 auto}
.sec{display:none}.sec.active{display:block}

/* Pair pills */
.pr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pp{padding:5px 14px;border-radius:100px;font-family:'DM Mono',monospace;font-size:12px;border:1px solid var(--bd2);background:transparent;color:var(--mt);cursor:pointer;white-space:nowrap}
.pp.active{background:var(--adm);color:var(--ac);border-color:var(--ac)}

/* Cards */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:12px}
.cl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mt);margin-bottom:10px}
.cb{font-size:14px;line-height:1.75;color:#c8c4be}.cb strong{color:var(--tx);font-weight:500}

/* Bias tags */
.bt{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:4px 12px;border-radius:100px;margin-bottom:12px}
.bbuy{background:var(--bbg);color:var(--buy);border:1px solid rgba(74,222,128,0.25)}
.bsel{background:var(--sbg);color:var(--sel);border:1px solid rgba(248,113,113,0.25)}
.bwt{background:var(--wbg);color:var(--wt);border:1px solid rgba(251,191,36,0.25)}
.bnt{background:var(--sf2);color:var(--mt);border:1px solid var(--bd2)}

/* Utils */
.dv{border:none;border-top:1px solid var(--bd);margin:14px 0}
.ld{display:flex;align-items:center;gap:10px;color:var(--mt);font-size:13px}
.sp{width:16px;height:16px;border:2px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.eb{background:var(--sbg);border:1px solid rgba(248,113,113,0.2);border-radius:var(--rs);padding:12px 14px;font-size:13px;color:var(--sel);line-height:1.6}
.rb{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;border:1px solid var(--bd2);background:transparent;color:var(--mt);font-family:'Syne',sans-serif;font-size:13px;cursor:pointer;margin-top:4px}
.meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);margin-top:10px}

/* Checklist */
.ci{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.ci:last-child{border-bottom:none}
.ck{width:20px;height:20px;flex-shrink:0;border:1.5px solid var(--bd2);border-radius:5px;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px}
.ck.done{background:var(--ac);border-color:var(--ac);color:#0a0a0a}
.clb{font-size:14px;color:#c8c4be;line-height:1.5}
.ci.done .clb{color:var(--mt);text-decoration:line-through}

/* Forms */
.ta{width:100%;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);padding:12px 14px;font-family:'Syne',sans-serif;font-size:14px;color:var(--tx);resize:vertical;min-height:90px;outline:none}
.ta:focus{border-color:var(--ac)}
.ta::placeholder{color:var(--mt)}
.inp{width:100%;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);padding:10px 14px;font-family:'Syne',sans-serif;font-size:14px;color:var(--tx);outline:none}
.inp:focus{border-color:var(--ac)}
.inp::placeholder{color:var(--mt)}
.sel-i{width:100%;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);padding:10px 14px;font-family:'Syne',sans-serif;font-size:14px;color:var(--tx);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none}
.sel-i:focus{border-color:var(--ac)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fld label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mt)}

/* Buttons */
.sb{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:10px 20px;background:var(--ac);color:#0a0a0a;border:none;border-radius:100px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.sb:disabled{opacity:0.5;cursor:not-allowed}

/* About */
.st{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.ss{font-size:13px;color:var(--mt);margin-bottom:18px}
.ai{padding:14px 0;border-bottom:1px solid var(--bd)}.ai:last-child{border-bottom:none}
.aq{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:4px}
.aa{font-size:13px;color:var(--mt);line-height:1.6}

/* Banner */
.bn{background:rgba(200,241,53,0.06);border:1px solid rgba(200,241,53,0.2);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px}
.bnt2{font-size:13px;color:#c8c4be;line-height:1.6;flex:1}.bnt2 strong{color:var(--ac)}
.bnc{background:none;border:none;color:var(--mt);font-size:18px;cursor:pointer;padding:0 4px}

/* ── SESSIONS ── */
.sess-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sess-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;transition:border-color 0.3s}
.sess-card.s-open{border-color:rgba(74,222,128,0.35);background:rgba(74,222,128,0.03)}
.sess-card.s-overlap{border-color:rgba(200,241,53,0.4);background:rgba(200,241,53,0.03)}
.sess-name{font-size:15px;font-weight:700;margin-bottom:3px}
.sess-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt);margin-bottom:10px}
.sess-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;padding:3px 10px;border-radius:100px;margin-bottom:10px}
.sess-badge.b-open{background:var(--bbg);color:var(--buy);border:1px solid rgba(74,222,128,0.3)}
.sess-badge.b-closed{background:var(--sf2);color:var(--mt);border:1px solid var(--bd2)}
.sess-badge.b-overlap{background:var(--adm);color:var(--ac);border:1px solid rgba(200,241,53,0.3)}
.sess-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);margin-bottom:2px}
.sess-cd{font-family:'DM Mono',monospace;font-size:13px;color:var(--tx);font-weight:500}
.clock-big{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--ac);text-align:center;margin-bottom:4px;letter-spacing:3px}
.clock-tz{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt);text-align:center;margin-bottom:20px}
.bp-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px}
.bp-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd)}
.bp-row:last-child{border-bottom:none}
.bp-name{font-weight:600;font-size:13px}
.bp-pairs{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt)}

/* ── CALENDAR ── */
.cal-legend{display:flex;gap:16px;margin-bottom:14px}
.cal-leg{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mt)}
.cal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cal-day-hdr{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ac);padding:6px 0;margin-bottom:8px;border-bottom:1px solid var(--bd)}
.cal-day{margin-bottom:18px}
.cal-event{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px}
.cal-imp{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.cal-imp.high{background:var(--sel)}
.cal-imp.med{background:var(--wt)}
.cal-imp.low{background:var(--mt)}
.cal-text{flex:1}
.cal-title{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:3px}
.cal-detail{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt)}

/* ── JOURNAL ── */
.jstats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.jstat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 8px;text-align:center}
.jstat-val{font-size:18px;font-weight:700;color:var(--ac);margin-bottom:3px}
.jstat-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:0.06em;line-height:1.3}
.jstat-val.jwin{color:var(--buy)}
.jstat-val.jloss{color:var(--sel)}
.jstat-val.jneu{color:var(--tx)}

/* Trade items */
.ti{background:var(--sf);border:1px solid var(--bd);border-left:3px solid var(--bd2);border-radius:var(--rs);padding:14px;margin-bottom:8px}
.ti.win{border-left-color:var(--buy)}
.ti.loss{border-left-color:var(--sel)}
.ti.be{border-left-color:var(--wt)}
.ti.open-t{border-left-color:var(--ac)}
.ti-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ti-pair{font-weight:700;font-size:14px}
.ti-dir{font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;border-radius:100px;margin-left:8px}
.ti-dir.buy{background:var(--bbg);color:var(--buy)}
.ti-dir.sell{background:var(--sbg);color:var(--sel)}
.ti-lvl{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt);margin-bottom:7px;display:flex;gap:12px;flex-wrap:wrap}
.ti-bot{display:flex;justify-content:space-between;align-items:center}
.ti-res{font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;border-radius:100px}
.ti-res.win{background:var(--bbg);color:var(--buy)}
.ti-res.loss{background:var(--sbg);color:var(--sel)}
.ti-res.be{background:var(--wbg);color:var(--wt)}
.ti-res.open-r{background:var(--adm);color:var(--ac)}
.ti-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt)}
.ti-pips{font-family:'DM Mono',monospace;font-size:12px;margin-left:8px}
.ti-pips.pos{color:var(--buy)}.ti-pips.neg{color:var(--sel)}
.ti-notes{font-size:12px;color:var(--mt);line-height:1.5;border-top:1px solid var(--bd);padding-top:8px;margin-top:8px}
.del-btn{background:none;border:none;color:var(--mt);cursor:pointer;font-size:14px;padding:2px 6px;line-height:1}
.del-btn:hover{color:var(--sel)}
.empty-j{text-align:center;padding:40px 20px;color:var(--mt);font-size:14px}

/* Calculator */
.calc-out{background:rgba(200,241,53,0.05);border:1px solid rgba(200,241,53,0.2);border-radius:var(--rs);padding:14px;margin-top:14px;display:none}
.cr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(200,241,53,0.08)}
.cr:last-child{border-bottom:none}
.cr-lbl{font-size:13px;color:#c8c4be}
.cr-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--ac);font-weight:500}
.hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);margin-top:6px}
</style>
</head>
